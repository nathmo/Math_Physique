name: Compile LaTeX to PDF

on:
  push:
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Compile RevisionHomeworkEN.tex
        uses: xu-cheng/latex-action@v3
        with:
          root_file: RevisionHomeworkEN.tex

      - name: Compile RevisionHomeworkENParentGuide.tex
        uses: xu-cheng/latex-action@v3
        with:
          root_file: RevisionHomeworkENParentGuide.tex

      - name: Compile RevisionHomeworkFR.tex
        uses: xu-cheng/latex-action@v3
        with:
          root_file: RevisionHomeworkFR.tex

      - name: Compile RevisionHomeworkFRParentGuide.tex
        uses: xu-cheng/latex-action@v3
        with:
          root_file: RevisionHomeworkFRParentGuide.tex

      - name: Compile conversion_energie.tex
        uses: xu-cheng/latex-action@v3
        with:
          root_file: conversion_energie.tex

      - name: Compile energy_and_power.tex
        uses: xu-cheng/latex-action@v3
        with:
          root_file: energy_and_power.tex

      - name: Compile energy_and_power_en.tex
        uses: xu-cheng/latex-action@v3
        with:
          root_file: energy_and_power_en.tex

      - name: Compile hongrin_en.tex
        uses: xu-cheng/latex-action@v3
        with:
          root_file: hongrin_en.tex

      - name: Compile hongrin_fr.tex
        uses: xu-cheng/latex-action@v3
        with:
          root_file: hongrin_fr.tex

      - name: Compile intro_conversion_energie.tex
        uses: xu-cheng/latex-action@v3
        with:
          root_file: intro_conversion_energie.tex

      - name: Compile log_exponential.tex
        uses: xu-cheng/latex-action@v3
        with:
          root_file: log_exponential.tex

      - name: Compile math_cheatsheet.tex
        uses: xu-cheng/latex-action@v3
        with:
          root_file: math_cheatsheet.tex

      - name: Compile unite_SI.tex
        uses: xu-cheng/latex-action@v3
        with:
          root_file: unite_SI.tex

      - name: Move PDFs to pdf/ folder
        run: |
          mkdir -p pdf
          find . -maxdepth 1 -name '*.pdf' -exec mv {} pdf/ \;

      - name: Commit and push compiled PDFs
        if: github.event_name == 'push'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add pdf/
          # [skip ci] prevents an infinite loop: without it, this commit would
          # trigger another workflow run which would compile and commit again.
          git diff --cached --quiet || git commit -m "chore: update compiled PDFs [skip ci]"
          git push

      - name: Upload PDFs as artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: compiled-pdfs
          path: "pdf/*.pdf"
